
# ══════════════════════════════════════════════════════════════════
#  ✦ HYPRLAND CONFIGURATION — "Maid's Devotion" Theme ✦
#
#   At your service, Master. Every pixel arranged with care.
#   Palette: Uniform Black · Apron White · Rose Ribbon · Gold Trim
# ══════════════════════════════════════════════════════════════════


################
### MONITORS ###
################

monitor=,1600x900,auto,1


###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = nautilus
$menu        = rofi -show drun


#################
### AUTOSTART ###
#################

exec-once = hyprpaper
exec-once = ~/.config/waybar/launch.sh
exec-once = quickshell
exec-once = dunst


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 6
    gaps_out = 16

    border_size = 2

    # Rose ribbon → gold trim gradient — the mark of devoted service
    col.active_border   = rgba(C8638Aff) rgba(D4AF37ff) 45deg
    col.inactive_border = rgba(2A1E2Eff)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 14
    rounding_power = 3

    active_opacity   = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled        = true
        range          = 20
        render_power   = 4
        color          = rgba(C8638A44)
        color_inactive = rgba(0D0B0F88)
    }

    blur {
        enabled    = true
        size       = 8
        passes     = 2
        vibrancy   = 0.22
        noise      = 0.02
        contrast   = 0.90
        brightness = 0.85
        xray       = false
    }
}

animations {
    enabled = yes, please :)

    # ── Silk curves — smooth as a maid's glide across the room ──
    bezier = silk,    0.25, 1,    0.5,  1
    bezier = silkIn,  0.4,  0,    0.6,  1
    bezier = silkOut, 0.0,  0,    0.4,  1
    bezier = bounce,  0.34, 1.56, 0.64, 1
    bezier = linear,  0,    0,    1,    1
    bezier = quick,   0.15, 0,    0.1,  1

    animation = global,        1,  10,  silk
    animation = border,        1,   6,  silk
    animation = windows,       1,   5,  silk
    animation = windowsIn,     1,   4,  bounce,  popin 80%
    animation = windowsOut,    1,   3,  silkOut, popin 80%
    animation = fadeIn,        1,   2,  silk
    animation = fadeOut,       1,   2,  silkOut
    animation = fade,          1,   3,  silk
    animation = layers,        1,   4,  silk
    animation = layersIn,      1,   4,  bounce,  fade
    animation = layersOut,     1,   2,  silkOut, fade
    animation = fadeLayersIn,  1,   2,  silk
    animation = fadeLayersOut, 1, 1.5,  silkOut
    animation = workspaces,    1,   5,  silk,    slidefade 20%
    animation = workspacesIn,  1,   5,  silk,    slidefade 20%
    animation = workspacesOut, 1,   4,  silkOut, slidefade 20%
    animation = zoomFactor,    1,   8,  quick
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper      = -1
    disable_hyprland_logo        = false
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
}


#############
### INPUT ###
#############

input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod,       Return,  exec, $terminal
bind = $mainMod,       Q,       killactive,
bind = $mainMod,       M,       exit,
bind = $mainMod,       E,       exec, $fileManager
bind = $mainMod,       V,       togglefloating,
bind = $mainMod,       O,       exec, $menu
bind = $mainMod,       P,       pseudo,
bind = $mainMod,       J,       togglesplit,
bind = $mainMod,       A,       exec, firefox
bind = $mainMod SHIFT, C,       exec, hyprshot -m region output --clipboard-only
bind = $mainMod SHIFT, B,       exec, ~/.config/waybar/launch.sh

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind  = $mainMod,       S, togglespecialworkspace, magic
bind  = $mainMod SHIFT, S, movetoworkspace,        special:magic

bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

