# ══════════════════════════════════════════════════════════════════
#  ✦ KITTY — "Maid's Devotion" Theme ✦
#  A refined terminal, befitting the Master's work.
# ══════════════════════════════════════════════════════════════════

background_opacity   0.88
window_padding_width 14

# ── Base ──
background   #0D0B0F
foreground   #F0E8F0

# ── Cursor — the rose ribbon ──
cursor            #C8638A
cursor_text_color #0D0B0F
cursor_blink_interval 0.6

# ── Selection ──
selection_background #C8638A
selection_foreground #0D0B0F

# ── URL ──
url_color #D4AF37

# ── Window borders ──
active_border_color   #C8638A
inactive_border_color #2A1E2E
bell_border_color     #D4AF37

# ── Tab bar ──
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_background   #C8638A
active_tab_foreground   #0D0B0F
active_tab_font_style   bold
inactive_tab_background #251E2E
inactive_tab_foreground #9E8EA0
tab_bar_background      #0D0B0F
tab_bar_margin_color    #0D0B0F

# ── Color table ──
# Black
color0  #1A1520
color8  #2A2030

# Red — Rose ribbon
color1  #C8638A
color9  #E888AA

# Green — soft mint
color2  #7EB87E
color10 #9ED09E

# Yellow — Gold trim
color3  #D4AF37
color11 #F0CC60

# Blue — midnight indigo
color4  #7B5EA7
color12 #9B7EC7

# Magenta — blush pink
color5  #E8A8C0
color13 #F0C8D8

# Cyan — chamber blue
color6  #88B4C8
color14 #A8CCE0

# White — apron white
color7  #D8D0D8
color15 #F0E8F0
